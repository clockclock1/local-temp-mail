server {
    listen 80;
    server_name _;
    absolute_redirect off;
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    # Serve SPA entrypoints for top-level frontend routes without letting
    # nginx normalize them into an absolute /admin/ redirect that drops
    # the mapped host port (for example 8080 -> 80 inside the container).
    location = /admin {
        try_files /index.html =404;
    }

    location = /admin/ {
        try_files /index.html =404;
    }

    location = /user {
        try_files /index.html =404;
    }

    location = /user/ {
        try_files /index.html =404;
    }

    location = /telegram_mail {
        try_files /index.html =404;
    }

    location = /telegram_mail/ {
        try_files /index.html =404;
    }

    location ~ ^/(zh|en|es|ja|de|pt-BR)/(admin|user|telegram_mail)/?$ {
        try_files /index.html =404;
    }

    location /api/ {
        set $backend_upstream backend:8787;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /open_api/ {
        set $backend_upstream backend:8787;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /user_api/ {
        set $backend_upstream backend:8787;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        set $backend_upstream backend:8787;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /telegram/ {
        set $backend_upstream backend:8787;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /external/ {
        set $backend_upstream backend:8787;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
