# Pull prebuilt Release images from GHCR.
# This Compose file does not build images on the target host.
services:
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/clockclock1/local-temp-mail}/tempmail-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: tempmail-backend
    env_file:
      - worker/.env.local
    volumes:
      - backend_data:/app/worker/.local-data
    ports:
      - "8787:8787"
      - "2525:2525"
    restart: unless-stopped

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/clockclock1/local-temp-mail}/tempmail-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: tempmail-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  backend_data:
