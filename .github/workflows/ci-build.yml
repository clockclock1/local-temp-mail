name: Release Build

on:
  release:
    types:
      - published

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend deps
        working-directory: worker
        run: corepack pnpm install --frozen-lockfile

      - name: Prepare backend env
        shell: pwsh
        run: Copy-Item worker/.env.local.example worker/.env.local -Force

      - name: Backend smoke test
        working-directory: worker
        run: corepack pnpm run local:smoke

      - name: Install frontend deps
        working-directory: frontend
        run: corepack pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ""
        run: corepack pnpm run build

  release-assets:
    name: Build Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend deps
        working-directory: worker
        run: corepack pnpm install --frozen-lockfile

      - name: Prepare backend env
        run: cp worker/.env.local.example worker/.env.local

      - name: Backend smoke test
        working-directory: worker
        run: corepack pnpm run local:smoke

      - name: Install frontend deps
        working-directory: frontend
        run: corepack pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ""
        run: corepack pnpm run build

      - name: Pack release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          zip -r release-assets/local-temp-mail-frontend-dist.zip frontend/dist
          tar -czf release-assets/local-temp-mail-server-bundle.tar.gz \
            README.md DEPLOY_GUIDE.md MAIL_GATEWAY.md docker-compose.yml \
            docker db deploy worker frontend/.env.example worker/.env.local.example
          sha256sum release-assets/* > release-assets/SHA256SUMS.txt

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/local-temp-mail-frontend-dist.zip
            release-assets/local-temp-mail-server-bundle.tar.gz
            release-assets/SHA256SUMS.txt
