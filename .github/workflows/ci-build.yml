name: CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  local-build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend deps
        working-directory: worker
        run: corepack pnpm install --frozen-lockfile

      - name: Prepare backend env
        shell: pwsh
        run: Copy-Item worker/.env.local.example worker/.env.local -Force

      - name: Backend smoke test
        working-directory: worker
        run: corepack pnpm run local:smoke

      - name: Install frontend deps
        working-directory: frontend
        run: corepack pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ""
        run: corepack pnpm run build

  artifact-check:
    name: Upload Build Artifacts
    runs-on: ubuntu-latest
    needs: local-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend deps
        working-directory: frontend
        run: corepack pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ""
        run: corepack pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
