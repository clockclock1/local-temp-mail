name: Release Docker Images

on:
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io

jobs:
  docker-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare metadata
        shell: bash
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "TAG_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build and push backend image
        shell: bash
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f docker/backend.Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/tempmail-backend:${{ env.TAG_NAME }} \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/tempmail-backend:latest \
            --push .

      - name: Build and push frontend image
        shell: bash
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f docker/frontend.Dockerfile \
            --build-arg VITE_API_BASE= \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/tempmail-frontend:${{ env.TAG_NAME }} \
            -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/tempmail-frontend:latest \
            --push .

      - name: Export OCI image assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          docker buildx build \
            --platform linux/amd64 \
            -f docker/backend.Dockerfile \
            -o type=oci,dest=release-assets/tempmail-backend-linux-amd64.oci .
          gzip -f release-assets/tempmail-backend-linux-amd64.oci

          docker buildx build \
            --platform linux/arm64 \
            -f docker/backend.Dockerfile \
            -o type=oci,dest=release-assets/tempmail-backend-linux-arm64.oci .
          gzip -f release-assets/tempmail-backend-linux-arm64.oci

          docker buildx build \
            --platform linux/amd64 \
            -f docker/frontend.Dockerfile \
            --build-arg VITE_API_BASE= \
            -o type=oci,dest=release-assets/tempmail-frontend-linux-amd64.oci .
          gzip -f release-assets/tempmail-frontend-linux-amd64.oci

          docker buildx build \
            --platform linux/arm64 \
            -f docker/frontend.Dockerfile \
            --build-arg VITE_API_BASE= \
            -o type=oci,dest=release-assets/tempmail-frontend-linux-arm64.oci .
          gzip -f release-assets/tempmail-frontend-linux-arm64.oci

          cat > release-assets/docker-images.txt <<EOF
          Backend image:
          ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/tempmail-backend:${{ env.TAG_NAME }}
          ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/tempmail-backend:latest

          Frontend image:
          ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/tempmail-frontend:${{ env.TAG_NAME }}
          ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/tempmail-frontend:latest
          EOF

          sha256sum release-assets/* > release-assets/SHA256SUMS-docker.txt

      - name: Upload docker assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/tempmail-backend-linux-amd64.oci.gz
            release-assets/tempmail-backend-linux-arm64.oci.gz
            release-assets/tempmail-frontend-linux-amd64.oci.gz
            release-assets/tempmail-frontend-linux-arm64.oci.gz
            release-assets/docker-images.txt
            release-assets/SHA256SUMS-docker.txt
